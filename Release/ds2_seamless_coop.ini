# Dark Souls 2 Seamless Co-op Configuration
# Boolean values: true/false or 1/0

# ═══════════════════════════════════════════════════════════
# ⚠️  IMPORTANT - BAN SAFETY ⚠️
# ═══════════════════════════════════════════════════════════
#
# TO AVOID BANS:
# 1. Set Steam to OFFLINE MODE before starting DS2
# 2. Or set DS2 to "Play Offline" in game settings
# 3. This mod uses P2P networking (not Steam servers)
# 4. Playing offline = 100% safe from bans
#
# The mod will NOT connect to Steam/FromSoftware servers!
# You connect directly to your friends via IP address.
#
# ═══════════════════════════════════════════════════════════
# BASIC SETTINGS
# ═══════════════════════════════════════════════════════════

# Enable/disable the mod
enabled=true

# Enable debug logging (creates more detailed logs)
debug_logging=false

# Maximum number of players in a session (2-6)
# Note: More players may impact performance
max_players=2

# ═══════════════════════════════════════════════════════════
# CONNECTION SETTINGS (IMPORTANT!)
# ═══════════════════════════════════════════════════════════

# How to connect with friends:
#
# IF YOU'RE HOSTING:
#   1. Leave host_ip empty (or comment it out)
#   2. Share your public IP with friends (google "what is my ip")
#   3. Forward port 27015 UDP on your router
#   4. Make sure your friends set YOUR IP in their config
#
# IF YOU'RE JOINING:
#   1. Set host_ip to your friend's IP address
#   2. Example: host_ip=192.168.1.100
#   3. Or public IP: host_ip=73.123.45.67
#
# Host IP address (leave empty if you're hosting)
host_ip=

# Session password (optional - must match on all clients)
# Leave empty for no password, or set the same password for everyone
# Example: session_password=sunbros123
session_password=

# Network port (default: 27015)
# Change if you have port conflicts
# Make sure to forward this port if you're hosting!
network_port=27015

# ═══════════════════════════════════════════════════════════
# GAMEPLAY SETTINGS
# ═══════════════════════════════════════════════════════════

# Allow invasions during co-op (experimental)
# WARNING: May not work correctly, use at your own risk
allow_invasions=false

# Synchronize bonfire states between players
# When one player lights a bonfire, it lights for all players
sync_bonfires=true

# Synchronize item pickups (experimental)
# When one player picks up an item, it's removed for all players
# WARNING: May cause item duplication or loss
sync_items=false

# Synchronize enemy kills (experimental)  
# When one player kills an enemy, it dies for all players
# WARNING: May cause desync issues
sync_enemies=false

# ═══════════════════════════════════════════════════════════
# CUSTOM SERVER SETTINGS
# ═══════════════════════════════════════════════════════════

# Enable custom server redirect (bypasses FromSoft servers entirely)
# When enabled, the game connects to your own server instead of FromSoft's
# This means: no softban risk, no soul memory restrictions, full control
use_custom_server=true

# IP address of the custom server
# - If YOU are running the server: use 127.0.0.1
# - If your FRIEND is running the server: use their Hamachi IP (25.x.x.x)
server_ip=127.0.0.1

# Login server port (must match the server's LoginServerPort config)
server_port=50031

# ═══════════════════════════════════════════════════════════
# ADVANCED NETWORK SETTINGS
# (Don't change unless you know what you're doing)
# ═══════════════════════════════════════════════════════════

# Position sync rate in Hz (default: 20)
# Higher = smoother but more bandwidth
# Range: 10-60
position_sync_rate=20

# State sync rate in Hz (default: 2)
# How often to sync health/stamina/stats
# Range: 1-10
state_sync_rate=2

# Heartbeat interval in seconds (default: 5)
# How often to send heartbeat packets to keep connection alive
heartbeat_interval=5

# Timeout duration in seconds (default: 15)
# How long to wait before considering a player disconnected
timeout_duration=15

# Enable interpolation for remote player movement (default: true)
# Smooths out network lag but may feel slightly delayed
enable_interpolation=true

# Interpolation speed (default: 10.0)
# Higher = faster catch-up, lower = smoother but more lag
interpolation_speed=10.0

# ═══════════════════════════════════════════════════════════
# LOG FILE SETTINGS
# ═══════════════════════════════════════════════════════════

# Maximum log file size in MB (default: 10)
# Log will rotate when it reaches this size
max_log_size=10

# Keep last N log files (default: 3)
# Older logs will be deleted
max_log_files=3

# ═══════════════════════════════════════════════════════════
# QUICK TROUBLESHOOTING
# ═══════════════════════════════════════════════════════════
#
# Can't connect to friend?
# - Make sure host has forwarded port 27015 (UDP)
# - Check firewalls on both computers
# - Verify you're using the correct IP
# - Try setting session_password to something and match on both
#
# Game crashes?
# - Check ds2_seamless_coop.log for errors
# - Try disabling sync_items and sync_enemies
# - Make sure game version is up to date
#
# Lag/Desync?
# - Lower position_sync_rate to 10-15
# - Check your network connection
# - Host should have good upload speed
#
# ═══════════════════════════════════════════════════════════

